name: Test1
on:
  workflow_call:
    inputs:
      environment:
        type: string
    secrets:
      ADMIN_USERNAME:
        required: true

jobs:
  checking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
  call-test2:
    needs: checking
    uses: ./.github/workflows/test2.yml
    with:
      environment: ${{ inputs.environment }}
    secrets:
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}  # Forward again
